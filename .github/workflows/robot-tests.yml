name: Robot API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      include_tag:
        description: "Robot tag to run (e.g. smoke, required, extended)"
        required: true
        default: "required"

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start fake server and run Robot tests
        run: |
          python fake_server/app.py &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/payment?scenario=happy_path > /dev/null; then
              echo "Fake server is ready"
              break
            fi
            sleep 1
          done
          python -m robot --include "${{ github.event.inputs.include_tag || 'required' }}" -d log features/
          kill $SERVER_PID || true

      - name: Upload Robot reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: robot-reports
          path: log/
          retention-days: 14
