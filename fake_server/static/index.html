<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyDigipay — Payment methods (demo)</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #fff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --danger: #dc2626;
      --disabled: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 520px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    h1 { font-size: 1.25rem; margin: 0 0 0.25rem; }
    .sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.25rem; }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); margin-bottom: 0.35rem; }
    select, input, button {
      width: 100%;
      font: inherit;
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    button {
      margin-top: 0.75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { filter: brightness(1.05); }
    .methods { display: flex; flex-direction: column; gap: 0.5rem; }
    .method {
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .method:hover:not(.disabled) { border-color: var(--accent); }
    .method.selected { border-color: var(--accent); background: var(--accent-soft); }
    .method.disabled {
      opacity: 0.55;
      cursor: not-allowed;
      background: #f8fafc;
    }
    .method-head { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .method-title { font-weight: 600; }
    .badge {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      background: #e2e8f0;
      color: var(--muted);
    }
    .options { margin-top: 0.65rem; padding-top: 0.65rem; border-top: 1px dashed var(--border); }
    .option {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0;
      font-size: 0.875rem;
    }
    .option input { width: auto; margin-right: 0.5rem; }
    .option.ineligible { color: var(--disabled); text-decoration: line-through; }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--danger);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
    }
    .footer { font-size: 0.75rem; color: var(--muted); text-align: center; margin-top: 1rem; }
    .pay-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 0.85rem;
      background: #0f172a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: not-allowed;
      opacity: 0.5;
    }
    .pay-btn.ready { opacity: 1; cursor: pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Checkout — payment method</h1>
    <p class="sub">Demo UI for the fake <code>GET /payment/</code> API (not part of Robot tests).</p>

    <div class="panel">
      <label for="scenario">Test scenario</label>
      <select id="scenario">
        <option value="happy_path">happy_path (S1)</option>
        <option value="bnpl_blocked">bnpl_blocked (S2)</option>
        <option value="insufficient_credit">insufficient_credit (S3)</option>
        <option value="inactive_bnpl">inactive_bnpl (S4)</option>
        <option value="multiple_default">multiple_default (S5)</option>
        <option value="missing_required_field">missing_required_field (S6)</option>
        <option value="wrong_type">wrong_type (S7)</option>
        <option value="server_error">server_error (S8)</option>
        <option value="body_error">body_error (extended)</option>
        <option value="empty_payment_methods">empty_payment_methods</option>
      </select>
      <label for="cell">Cell number</label>
      <input id="cell" type="text" value="09120000000" placeholder="09120000000" />
      <button type="button" id="load">Load payment methods</button>
    </div>

    <div id="status"></div>
    <div id="methods" class="methods"></div>
    <button type="button" class="pay-btn" id="pay" disabled>Pay (demo only)</button>
    <p class="footer">Same JSON fixtures as <code>testdata/scenarios/</code> · API automation unchanged</p>
  </div>

  <script>
    const scenarioEl = document.getElementById("scenario");
    const cellEl = document.getElementById("cell");
    const loadBtn = document.getElementById("load");
    const statusEl = document.getElementById("status");
    const methodsEl = document.getElementById("methods");
    const payBtn = document.getElementById("pay");

    let selectedMethodId = null;

    loadBtn.addEventListener("click", loadMethods);
    scenarioEl.addEventListener("change", loadMethods);

    async function loadMethods() {
      statusEl.innerHTML = "";
      methodsEl.innerHTML = "";
      selectedMethodId = null;
      payBtn.classList.remove("ready");
      payBtn.disabled = true;

      const scenario = scenarioEl.value;
      const cell = encodeURIComponent(cellEl.value.trim());
      const url = `/payment?scenario=${scenario}&CellNumber=${cell}`;

      try {
        const res = await fetch(url);
        if (!res.ok) {
          statusEl.innerHTML = `<div class="error">HTTP ${res.status} — fail fast (e.g. S8)</div>`;
          return;
        }
        const data = await res.json();
        if (data.status !== 200) {
          statusEl.innerHTML = `<div class="error">Body status ${data.status} — API error</div>`;
          return;
        }
        renderMethods(data.payment_methods || []);
      } catch (err) {
        statusEl.innerHTML = `<div class="error">${err.message}</div>`;
      }
    }

    function renderMethods(methods) {
      if (!methods.length) {
        statusEl.innerHTML = '<div class="error">No payment methods returned.</div>';
        return;
      }
      methods.forEach((m) => {
        const el = document.createElement("div");
        el.className = "method" + (m.is_clickable ? "" : " disabled");
        el.dataset.id = m.id;

        const head = document.createElement("div");
        head.className = "method-head";
        head.innerHTML = `<span class="method-title">${escapeHtml(m.title || m.type)}</span><span class="badge">${escapeHtml(m.type)}</span>`;
        el.appendChild(head);

        if (!m.is_clickable) {
          const note = document.createElement("p");
          note.style.cssText = "margin:0.35rem 0 0;font-size:0.8rem;color:var(--muted)";
          note.textContent = "Not selectable (Rule R2)";
          el.appendChild(note);
        } else {
          el.addEventListener("click", () => selectMethod(el, m));
        }

        if (m.type === "bnpl" && Array.isArray(m.options) && m.options.length) {
          const opts = document.createElement("div");
          opts.className = "options";
          m.options.forEach((o) => {
            const eligible = o.is_active && o.credit > 0;
            const row = document.createElement("label");
            row.className = "option" + (eligible ? "" : " ineligible");
            const checked = eligible && o.is_default ? " checked" : "";
            row.innerHTML = `<span><input type="radio" name="bnpl-${m.id}"${checked} ${eligible ? "" : "disabled"} /> ${escapeHtml(o.title)} · credit ${formatCredit(o.credit)}</span><span class="badge">${escapeHtml(o.price_type || "")}</span>`;
            opts.appendChild(row);
          });
          el.appendChild(opts);
        }

        methodsEl.appendChild(el);
      });
    }

    function selectMethod(el, method) {
      document.querySelectorAll(".method.selected").forEach((n) => n.classList.remove("selected"));
      el.classList.add("selected");
      selectedMethodId = method.id;
      payBtn.classList.add("ready");
      payBtn.disabled = false;
    }

    function formatCredit(n) {
      return new Intl.NumberFormat("en-US").format(n);
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = String(s);
      return d.innerHTML;
    }

    loadMethods();
  </script>
</body>
</html>
